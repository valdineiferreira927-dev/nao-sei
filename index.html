<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things Mix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #050a0f;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .content-wrapper {
            position: absolute;
            height: 100%;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content; 
            min-width: 350px; 
            z-index: 10;
        }

        .demogorgon-bg {
            height: 100%;
            width: auto;
            display: block; 
            object-fit: contain; 
        }

        .player-widget {
            position: absolute;
            bottom: 15px; 
            left: 0; 
            width: 100%; 
            height: 60px; 
            background: rgba(30, 30, 30, 0.9);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            color: #d7ccc8;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
            z-index: 50;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0; 
        }
        .controls button {
            background: none; border: none; outline: none;
            color: #ffccbc; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
        }
        .controls button svg { fill: currentColor; }
        .btn-play svg { width: 30px; height: 30px; }
        .btn-next svg { width: 18px; height: 18px; }

        .album-and-track {
            flex-grow: 1; 
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 15px;
            overflow: hidden; 
        }

        .album-cover-wrapper {
            width: 40px;
            height: 40px;
            position: relative;
            flex-shrink: 0; 
            border-radius: 5px; 
            overflow: hidden;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .album-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
        }

        .album-cover-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(to bottom, transparent, rgba(30, 30, 30, 0.8));
            pointer-events: none;
        }

        .track-and-progress {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            overflow: hidden;
            width: 100%;
        }

        .track-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            overflow: hidden;
        }
        .track-title { font-size: 14px; font-weight: 700; color: #ffccbc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 10px; font-weight: 600; color: #8d6e63; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 9px;
            font-weight: 600;
            color: #ffccbc;
        }
        
        .custom-progress-bar {
            flex-grow: 1;
            height: 2px; 
            background: #4e342e; 
            border-radius: 1px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .custom-progress-fill {
            height: 100%;
            background: #ffccbc; 
            width: 0%;
            border-radius: 1px;
            pointer-events: none;
        }

        .custom-progress-thumb {
            width: 7px; 
            height: 7px;
            background: #ffccbc;
            border-radius: 50%;
            position: absolute;
            left: 0%;
            transform: translateX(-50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            pointer-events: none;
            transition: transform 0.1s;
        }
        
        .custom-progress-bar:hover .custom-progress-thumb {
            transform: translateX(-50%) scale(1.3);
        }
    </style>
</head>
<body>

    <div class="content-wrapper" id="start-screen">
        <img src="fundo.png" class="demogorgon-bg">
        
        <div class="player-widget">
            <div class="controls">
                <button class="btn-play" id="play-pause-btn">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn-next" id="next-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>

            <div class="album-and-track">
                <div class="album-cover-wrapper">
                    <img id="album-cover" class="album-cover" src="">
                </div>

                <div class="track-and-progress">
                    <div class="track-header">
                        <span class="track-title" id="track-name">Carregando...</span>
                        <span class="track-artist" id="track-artist">Stranger Things Mix</span>
                    </div>
                    
                    <div class="progress-container">
                        <span id="current-time">00:00</span>
                        <div class="custom-progress-bar" id="custom-progress-bar">
                            <div class="custom-progress-fill" id="progress-fill"></div>
                            <div class="custom-progress-thumb" id="progress-thumb"></div>
                        </div>
                        <span id="total-time">00:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const originalPlaylist = [
            { title: "Master of Puppets", artist: "Metallica", src: "musica1.mpeg", albumCover: "capa2.jpg" },
            { title: "Never Ending Story", artist: "Limahl", src: "musica2.mpeg", albumCover: "capa3.png" },
            { title: "Running Up That Hill", artist: "Kate Bush", src: "musica3.mpeg", albumCover: "capa4.png" },
            { title: "Should I Stay or Should I Go", artist: "The Clash", src: "musica4.mpeg", albumCover: "capa5.png" },
            { title: "Upside Down", artist: "Diana Ross", src: "musica5.mpeg", albumCover: "capa1.png" }
        ];

        let playlist = [];
        let currentTrackIndex = 0;
        let isPlaying = false;
        let autoPlayTentado = false;
        const audioObject = new Audio();

        const playPauseBtn = document.getElementById("play-pause-btn");
        const nextBtn = document.getElementById("next-btn");
        const iconPlay = document.getElementById("icon-play");
        const iconPause = document.getElementById("icon-pause");
        const trackNameUI = document.getElementById("track-name");
        const trackArtistUI = document.getElementById("track-artist"); 
        const albumCoverUI = document.getElementById("album-cover");
        const customProgressBar = document.getElementById("custom-progress-bar");
        const customProgressFill = document.getElementById("progress-fill");
        const customProgressThumb = document.getElementById("progress-thumb");
        const currentTimeUI = document.getElementById("current-time");
        const totalTimeUI = document.getElementById("total-time");

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return "00:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function loadTrack(index) {
            audioObject.src = playlist[index].src;
            trackNameUI.innerText = playlist[index].title;       
            trackArtistUI.innerText = playlist[index].artist;    
            albumCoverUI.src = playlist[index].albumCover;
            audioObject.load();
            customProgressFill.style.width = "0%";
            customProgressThumb.style.left = "0%";
        }

        audioObject.onerror = function() {
            trackNameUI.innerText = "Erro ao carregar ❌";
            trackArtistUI.innerText = "Verifique o arquivo";
            totalTimeUI.innerText = "--:--";
            isPlaying = false;
            iconPlay.style.display = "block";
            iconPause.style.display = "none";
        };

        function togglePlay() {
            if (isPlaying) {
                audioObject.pause();
                iconPlay.style.display = "block";
                iconPause.style.display = "none";
            } else {
                audioObject.play().then(() => {
                    iconPlay.style.display = "none";
                    iconPause.style.display = "block";
                }).catch((error) => console.log(error));
            }
            isPlaying = !isPlaying;
        }

        function nextTrack() {
            currentTrackIndex++;
            if (currentTrackIndex >= playlist.length) {
                playlist = shuffleArray(originalPlaylist);
                currentTrackIndex = 0;
            }
            loadTrack(currentTrackIndex);
            if(isPlaying){
                audioObject.play().catch(e => console.log(e));
            }
        }

        playPauseBtn.addEventListener("click", (e) => {
            e.stopPropagation(); // Evita dar duplo play ao clicar no botão
            togglePlay();
        });
        
        nextBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            nextTrack();
        });
        
        audioObject.addEventListener("ended", nextTrack);

        audioObject.addEventListener("timeupdate", () => {
            const current = audioObject.currentTime;
            const duration = audioObject.duration;
            currentTimeUI.innerText = formatTime(current);
            if (duration) {
                const percentage = (current / duration) * 100;
                customProgressFill.style.width = percentage + "%";
                customProgressThumb.style.left = percentage + "%";
                totalTimeUI.innerText = formatTime(duration);
            }
        });

        customProgressBar.addEventListener("click", (e) => {
            e.stopPropagation();
            const duration = audioObject.duration;
            if (duration) {
                const rect = customProgressBar.getBoundingClientRect();
                const clickX = e.clientX - rect.left; 
                const width = rect.width; 
                const percentage = clickX / width;
                audioObject.currentTime = percentage * duration;
            }
        });

        // INICIALIZAÇÃO E PLAY AUTOMÁTICO
        playlist = shuffleArray(originalPlaylist);
        loadTrack(currentTrackIndex);

        // Tenta tocar automaticamente logo que carrega
        window.addEventListener('DOMContentLoaded', () => {
            audioObject.play().then(() => {
                isPlaying = true;
                iconPlay.style.display = "none";
                iconPause.style.display = "block";
            }).catch(() => {
                console.log("Navegador bloqueou o Autoplay. Esperando o usuário tocar na tela.");
            });
        });

        // Se bloqueou, toca a música NO PRIMEIRO CLIQUE/TOQUE em QUALQUER lugar da tela
        document.body.addEventListener('click', function playOnFirstClick() {
            if (!isPlaying) {
                togglePlay();
            }
            // Remove esse evento depois do primeiro toque para não ficar pausando a música se ela clicar na foto
            document.body.removeEventListener('click', playOnFirstClick);
        }, { once: true });

    </script>
</body>
</html>
